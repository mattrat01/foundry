<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Foundry</title>
<meta name="description" content="It is the human's job to determine the destination, the AI can help illuminate the map.">
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 128 128'%3E%3Crect width='128' height='128' rx='26' fill='%23211F1C'/%3E%3Cpath d='M36 32 h56 l-11 24 h-34 z' fill='none' stroke='%23EDE7DA' stroke-width='6'/%3E%3Crect x='61' y='58' width='6' height='24' rx='3' fill='%23D96A28'/%3E%3Cpath d='M64 86 c5 6 7 9 7 12.5 a7 7 0 1 1 -14 0 c0-3.5 2-6.5 7-12.5 z' fill='%23F0913F'/%3E%3Crect x='34' y='106' width='60' height='9' rx='3' fill='%23EDE7DA'/%3E%3C/svg%3E">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Zilla+Slab:wght@600&family=IBM+Plex+Mono:wght@400&display=swap" rel="stylesheet">
<style>
  :root{
    /* color */
    --color-bg:#FFFFFF; --color-text:#211F1C; --color-muted:#8F887A;
    --color-ember:#D96A28; --color-ember-hot:#F0913F; --color-ember-deep:#A34712;
    --color-focus:var(--color-ember);
    /* type */
    --font-display:"Zilla Slab",Rockwell,"Roboto Slab",serif;
    --font-mono:"IBM Plex Mono",ui-monospace,"SF Mono",Menlo,monospace;
    --text-mark:clamp(2.6rem,7.5vw,4.2rem); --leading-mark:1.05;
    --text-link:0.95rem; --leading-link:1;
    /* space */
    --space-1:.25rem; --space-2:.5rem; --space-3:1rem; --space-4:1.5rem; --space-6:2.5rem;
    /* motion */
    --duration-settle:600ms; --duration-drop:850ms; --duration-in:450ms;
    --delay-drop:350ms; --delay-why:1250ms;
    --ease-out:cubic-bezier(.22,.9,.3,1); --ease-fall:cubic-bezier(.5,.05,.85,.4);
  }
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{height:100%}
  body{
    background:var(--color-bg); color:var(--color-text);
    display:grid; place-items:center; padding:var(--space-4);
    padding-bottom:12vh; /* optical centre sits above true centre */
    font-family:var(--font-display);
  }
  ::selection{background:var(--color-ember);color:#fff}
  main{text-align:center}

  h1{
    font-size:var(--text-mark); line-height:var(--leading-mark);
    font-weight:600; letter-spacing:-.015em;
    animation:settle var(--duration-settle) var(--ease-out) both;
  }
  /* the signature: the pour, distilled — one drop falls and becomes the full stop */
  .dot{
    display:inline-block; width:.13em; height:.13em; margin-left:.07em;
    border-radius:50%; background:var(--color-ember);
    animation:drop var(--duration-drop) var(--ease-fall) var(--delay-drop) both;
  }
  .why{
    display:inline-block; position:relative;
    margin-top:var(--space-6); padding:var(--space-2) var(--space-3) calc(var(--space-2) + .35rem);
    min-width:44px; min-height:44px;
    font-family:var(--font-mono); font-size:var(--text-link); line-height:var(--leading-link);
    letter-spacing:.14em; color:var(--color-text); text-decoration:none;
    animation:fadein var(--duration-in) var(--ease-out) var(--delay-why) both;
  }
  /* the cast bar from the mark, as underline — it heats on touch */
  .why::after{
    content:""; position:absolute; left:var(--space-3); right:var(--space-3); bottom:var(--space-2);
    height:2px; background:var(--color-ember);
    transform-origin:bottom; transition:transform 160ms var(--ease-out), background-color 160ms var(--ease-out);
  }
  .why:hover{color:var(--color-ember-deep)}
  .why:hover::after{transform:scaleY(1.6); background:var(--color-ember-hot)}
  .why:active{transform:translateY(1px)}
  .why:focus-visible{outline:2px solid var(--color-focus); outline-offset:4px; border-radius:2px}

  @keyframes settle{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
  @keyframes drop{
    0%{opacity:0;transform:translateY(-1.15em)}
    18%{opacity:1}
    82%{transform:translateY(0)}
    90%{transform:translateY(0) scale(1.18,.78)}
    100%{opacity:1;transform:none}
  }
  @keyframes fadein{from{opacity:0}to{opacity:1}}

  @media (prefers-reduced-motion: reduce){
    h1,.dot,.why{animation:none}
    .why::after{transition:none}
  }
</style>
</head>
<body>
<main>
  <h1>The Foundry<span class="dot" aria-hidden="true"></span></h1>
  <a class="why" href="https://github.com/mattrat01/foundry/blob/main/WHY.md"
     aria-label="Why the Foundry exists — the essay">why</a>
</main>
</body>
</html>
